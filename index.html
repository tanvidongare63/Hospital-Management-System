<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Hospital Management System</h1>
        <div class="form-container">
            <div class="add-patient">
                <h2>Add Patient</h2>
                <form id="patientForm">
                    <div class="form-group">
                        <label for="name">Patient Name:</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" required>
                    </div>
                    <div class="form-group">
                        <label for="disease">Disease/Medical Condition:</label>
                        <input type="text" id="disease" required>
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority:</label>
                        <select id="priority" required>
                            <option value="1">Emergency</option>
                            <option value="2">Normal</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="previousVisit">Previous Visit:</label>
                        <select id="previousVisit" required>
                            <option value="first">First Visit</option>
                            <option value="returning">Follow-up Visit</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="nextVisit">Next Scheduled Visit:</label>
                        <input type="date" id="nextVisit" required>
                    </div>
                    <button type="submit">Add Patient</button>
                </form>
            </div>
            <div class="treat-patient">
                <h2>Treat Patient</h2>
                <button id="treatBtn">Treat Next Patient</button>
            </div>
        </div>
        <div class="queue-container">
            <h2>Patient Queue</h2>
            <div id="queueList"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
